user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting (IP당 30req/s)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────
    # SSL 발급 전에는 아래 주석을 해제하지 마세요.
    # setup-ssl.sh 실행 후 아래 블록 주석 해제
    #
    # server {
    #     listen 80;
    #     server_name api.sagonnani.com admin.sagonnani.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── HTTP (SSL 미설정 시 임시 사용) ──────────────────────
    server {
        listen 80;
        server_name api.sagonnani.com;

        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 20M;
        }
    }

    server {
        listen 80;
        server_name admin.sagonnani.com;

        location / {
            proxy_pass http://admin:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS (setup-ssl.sh 실행 후 주석 해제) ────────────────
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name api.sagonnani.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     location / {
    #         limit_req zone=api burst=50 nodelay;
    #         proxy_pass http://api:3000;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         client_max_body_size 20M;
    #     }
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name admin.sagonnani.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
