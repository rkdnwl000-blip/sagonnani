version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sagonnani
      POSTGRES_USER: sagonnani
      POSTGRES_PASSWORD: sagonnani_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sagonnani:sagonnani_password@postgres:5432/sagonnani
      JWT_SECRET: your-secret-here
      PORT: 3000
    depends_on:
      - postgres

  admin:
    build: ./apps/admin
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

volumes:
  postgres_data:
