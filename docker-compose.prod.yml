version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sagonnani_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagonnani}
      POSTGRES_USER: ${POSTGRES_USER:-sagonnani}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sagonnani}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sagonnani_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
      - external
    ports:
      - "9000:9000"   # S3 API (앱에서 직접 접근)
      - "9001:9001"   # MinIO 관리 콘솔
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sagonnani_api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sagonnani}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sagonnani}
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL:-https://api.sagonnani.com/api/v1}
    ports:
      - "3000:3000"
    networks:
      - internal
      - external
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: sagonnani_admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3000"
    networks:
      - external
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: sagonnani_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - external
    depends_on:
      - api
      - admin

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    internal: true
  external:
